<div class="min-vh-100 d-flex align-items-center justify-content-center text-center">
  <div>
    <h1 class="fw-bold display-3 mb-3">X</h1>
    <p class="text-muted mb-4" style="max-width: 360px; margin: auto;">
      A place to share your thoughts, ideas, and stories.
    </p>
    @if(!loggedIn){
      <div class="d-flex gap-3 justify-content-center">
        <a routerLink="/register" class="btn btn-primary px-4">Get Started</a>
        <a routerLink="/login" class="btn btn-outline-secondary px-4">Login</a>
      </div>
    }
    @else{
      <div class="d-flex gap-3 justify-content-center">
        <a routerLink="/home" class="btn btn-primary px-4">Go to Feed</a>
      </div>
    }
  </div>
</div>
