<form>
@if(data){
    <div>
        <i>Title:</i>
        <input type="text" value="{{data.title}}" />
    </div>
    <div>
        <i>content:</i>
        <input type="text" value="{{data.content}}" />
    </div>
    <small>Created At: {{ data.createdAt }} &Tab;</small>
    <small>Created By: {{ data.userId ?? "Null" }}</small>
    <br/>
    <button type="submit">Edit</button>
}
</form>
<hr>
