<form>
@if(data){
    <div>
        <i>Title:</i>
        <input name="title" type="text" [(ngModel)]="data.title" />
    </div>
    <div>
        <i>content:</i>
        <input name="content" type="text" [(ngModel)]="data.content" />
    </div>
    <small>Created At: {{ data.createdAt }} &Tab;</small>
    <small>Created By: {{ data.userId ?? "Null" }}</small>
    <br/>
    <button type="submit" (click)="editPost()">Edit</button>
}
</form>
<hr>
