<div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="card p-4 w-100" style="max-width: 500px;">
    <h4 class="mb-4 text-center fw-bold">Create an account</h4>

    @if(error !== ""){
      <div class="alert alert-danger py-2">{{ error }}</div>
    }

    <form #f="ngForm" (ngSubmit)="submit()">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Username</label>
          <input pattern="[0-9a-zA-Z]*" required #userName="ngModel" name="username"
            placeholder="johndoe123" [(ngModel)]="registerForm.username" type="text"
            class="form-control" [class.is-invalid]="userName.invalid && userName.touched">
          <div class="invalid-feedback">Letters and numbers only.</div>
        </div>

        <div class="col-12">
          <label class="form-label">Email</label>
          <input #userEmail="ngModel" name="email" placeholder="you@example.com"
            [(ngModel)]="registerForm.email" required type="email" email
            class="form-control" [class.is-invalid]="userEmail.invalid && userEmail.touched">
          <div class="invalid-feedback">Enter a valid email address.</div>
        </div>

        <div class="col-6">
          <label class="form-label">First Name</label>
          <input #userFirstname="ngModel" name="firstname" placeholder="John"
            [(ngModel)]="registerForm.firstname" type="text" required
            class="form-control" [class.is-invalid]="userFirstname.invalid && userFirstname.touched">
          <div class="invalid-feedback">Required.</div>
        </div>

        <div class="col-6">
          <label class="form-label">Last Name</label>
          <input #userLastname="ngModel" name="Lastname" placeholder="Doe"
            [(ngModel)]="registerForm.lastname" type="text" required
            class="form-control" [class.is-invalid]="userLastname.invalid && userLastname.touched">
          <div class="invalid-feedback">Required.</div>
        </div>

        <div class="col-12">
          <label class="form-label">Address</label>
          <input required #userAddress="ngModel" name="address" placeholder="123 Main St"
            [(ngModel)]="registerForm.address" type="text"
            class="form-control" [class.is-invalid]="userAddress.invalid && userAddress.touched">
          <div class="invalid-feedback">Required.</div>
        </div>

        <div class="col-12">
          <label class="form-label">Password</label>
          <input required minlength="8" #userPassword="ngModel" name="password"
            placeholder="••••••••" [(ngModel)]="registerForm.password" type="password"
            class="form-control" [class.is-invalid]="userPassword.invalid && userPassword.touched">
          <div class="invalid-feedback">At least 8 characters.</div>
        </div>

        <div class="col-12">
          <label class="form-label">Confirm Password</label>
          <input required #userConfirmPassword="ngModel" name="confirmPassword"
            placeholder="••••••••" [(ngModel)]="registerForm.confirmPassword" type="password"
            class="form-control" [class.is-invalid]="(userConfirmPassword.touched && userConfirmPassword.invalid) || passwordMismatch()">
          <div class="invalid-feedback">Passwords do not match.</div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-4"
        [disabled]="f.invalid || passwordMismatch()">Register</button>
    </form>

    <p class="text-center text-muted mt-3 mb-0 small">
      Already have an account? <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
