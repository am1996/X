<form>
@if(data){
    <div>
        <i>Title:</i>
        <p>{{ data.title }}</p>
    </div>
    <div>
        <i>content:</i>
        <p>{{ data.content }}</p>
    </div>
    <small>Created At: {{ data.createdAt }} &Tab;</small>
    <small>Created By: {{ data.userId ?? "Null" }}</small>
    <hr/>
    <textarea cols="50" rows="10" name="comment" id="comment"></textarea>
    <br/>
    <button (click)="addComment()">Add Comment</button>
}
</form>
<hr>
