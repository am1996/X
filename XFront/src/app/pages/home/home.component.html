<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">Feed</h4>
    <a routerLink="/addpost" class="btn btn-primary btn-sm">
      <i class="bi bi-plus-lg me-1"></i> New Post
    </a>
  </div>

  @if(data){
    <div class="d-flex flex-column gap-3">
      @for(obj of data(); track obj.id){
        <div class="card p-4">
          <h5 class="fw-semibold mb-2 text-white">{{ obj.title }}</h5>
          <p class="mb-3 text-white" style="white-space: pre-wrap;">{{ obj.content }}</p>
          <div class="d-flex justify-content-between align-items-center">
            <small class="text-muted">
              <i class="bi bi-person-circle me-1"></i>{{ obj.username ?? "Unknown" }}
              &nbsp;&bull;&nbsp;
              <i class="bi bi-clock me-1"></i>{{ obj.createdAt | date:'mediumDate' }}
            </small>
            <div class="d-flex gap-2">
              <a routerLink="/showPost/{{ obj.id }}" class="btn btn-outline-secondary btn-sm">View</a>
              <a routerLink="/editpost/{{ obj.id }}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-pencil"></i>
              </a>
            </div>
          </div>
        </div>
      }
    </div>
  } @else {
    <div class="text-center text-muted py-5">
      <i class="bi bi-journal-x" style="font-size: 2rem;"></i>
      <p class="mt-2">No posts yet.</p>
    </div>
  }
</div>
